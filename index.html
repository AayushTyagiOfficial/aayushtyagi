<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; margin: 0;
        }
        h1 { font-size: 3rem; opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>

    <h1 id="title">Welcome to the Future.</h1>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // This makes the text slide up and fade in smoothly
        gsap.to("#title", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out", delay: 0.5 });
    </script>
</body>
</html>
