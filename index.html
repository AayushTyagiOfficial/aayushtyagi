<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aayush Tyagi — Writer & Graphic Designer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #05070f;
      --accent:  #e8d5b0;
      --gold:    #c9a96e;
      --muted:   rgba(232,213,176,0.32);
      --font:    'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font);
      overflow: hidden;
      cursor: none;
    }

    /* Cursor */
    #cursor { position: fixed; z-index: 9999; pointer-events: none; top: 0; left: 0; }
    .c-ring {
      position: absolute; width: 34px; height: 34px;
      border: 1px solid rgba(201,169,110,0.45); border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width .4s cubic-bezier(0.16,1,0.3,1), height .4s cubic-bezier(0.16,1,0.3,1);
    }
    .c-dot {
      position: absolute; width: 5px; height: 5px;
      background: var(--gold); border-radius: 50%;
      transform: translate(-50%,-50%);
    }
    body:has(a:hover) .c-ring, body:has(button:hover) .c-ring { width: 54px; height: 54px; }

    /* Canvas */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    /* Noise */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.042;
    }

    /* Vignette */
    .vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(5,7,15,0.88) 100%);
    }

    /* Main */
    main {
      position: relative; z-index: 3;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 0.6rem;
      border: 1px solid rgba(201,169,110,0.22);
      background: rgba(201,169,110,0.05);
      padding: 0.38rem 1.1rem; border-radius: 999px;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 2.6rem;
      opacity: 0; animation: rise 1s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .bdot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: blink 2.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* Name */
    .name-wrap {
      line-height: 1;
      opacity: 0; animation: rise 1.1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .name-first {
      display: block;
      font-size: clamp(3rem, 9.5vw, 8rem);
      font-weight: 200; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(232,213,176,0.16);
    }
    .name-last {
      display: block; position: relative;
      font-size: clamp(3rem, 9.5vw, 8rem);
      font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 80px rgba(201,169,110,0.35), 0 0 160px rgba(201,169,110,0.12);
      margin-top: -0.08em;
    }
    .name-last::before, .name-last::after {
      content: attr(data-text); position: absolute; inset: 0;
      letter-spacing: inherit; font-weight: inherit; font-size: inherit;
    }
    .name-last::before {
      color: rgba(80,200,255,0.22);
      animation: glitch1 7s 2s infinite;
      clip-path: polygon(0 20%,100% 20%,100% 42%,0 42%);
    }
    .name-last::after {
      color: rgba(255,80,80,0.15);
      animation: glitch2 7s 2.4s infinite;
      clip-path: polygon(0 60%,100% 60%,100% 80%,0 80%);
    }
    @keyframes glitch1 {
      0%,93%,100%{transform:translate(0);opacity:0}
      94%{transform:translate(-5px);opacity:1}
      96%{transform:translate(5px);opacity:1}
      98%{transform:translate(0);opacity:0}
    }
    @keyframes glitch2 {
      0%,93%,100%{transform:translate(0);opacity:0}
      94%{transform:translate(5px);opacity:1}
      96%{transform:translate(-5px);opacity:1}
      98%{transform:translate(0);opacity:0}
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 1.2rem; margin: 2rem 0 1.8rem;
      opacity: 0; animation: rise 1s 0.72s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .dl { flex: 1; max-width: 90px; height: 1px; background: linear-gradient(90deg,transparent,rgba(201,169,110,0.38)); }
    .dl.r { background: linear-gradient(90deg,rgba(201,169,110,0.38),transparent); }
    .dg { font-size: 0.62rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }

    /* Role pills */
    .roles {
      display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2.6rem;
      opacity: 0; animation: rise 1s 0.88s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      border: 1px solid rgba(201,169,110,0.2);
      background: rgba(201,169,110,0.04);
      padding: 0.52rem 1.3rem; border-radius: 6px;
      font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .pill:hover {
      background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.5);
      transform: translateY(-3px); box-shadow: 0 8px 28px rgba(201,169,110,0.1);
    }

    /* Tagline */
    .tagline {
      font-size: clamp(0.82rem, 1.6vw, 0.97rem);
      color: var(--muted); letter-spacing: 0.04em; line-height: 1.9;
      max-width: 420px; margin-bottom: 2.8rem;
      opacity: 0; animation: rise 1s 1.02s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* CTAs */
    .ctas {
      display: flex; gap: 0.9rem; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: rise 1s 1.16s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .btn {
      font-family: var(--font); font-size: 0.78rem; letter-spacing: 0.12em;
      text-transform: uppercase; font-weight: 600; padding: 0.85rem 2.1rem;
      border-radius: 6px; text-decoration: none; cursor: none;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1); display: inline-block; border: none;
    }
    .btn-p { background: var(--gold); color: var(--bg); box-shadow: 0 0 36px rgba(201,169,110,0.2); }
    .btn-p:hover { background: var(--accent); box-shadow: 0 0 56px rgba(201,169,110,0.4); transform: translateY(-3px); }
    .btn-g { border: 1px solid rgba(201,169,110,0.22); color: var(--accent); background: transparent; }
    .btn-g:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.05); transform: translateY(-3px); }

    /* Corners */
    .corner { position: fixed; z-index: 3; width: 38px; height: 38px; opacity: 0; animation: rise 1s 1.5s ease forwards; }
    .corner svg { width: 100%; height: 100%; }
    .tl { top: 2rem; left: 2rem; }
    .tr { top: 2rem; right: 2rem; transform: scaleX(-1); }
    .bl { bottom: 2rem; left: 2rem; transform: scaleY(-1); }
    .br { bottom: 2rem; right: 2rem; transform: scale(-1,-1); }

    /* Bottom bar */
    .bbar {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 3; display: flex; gap: 2rem; align-items: center;
      opacity: 0; animation: rise 1s 1.45s ease forwards;
    }
    .bi { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(201,169,110,0.28); }
    .bs { width: 1px; height: 14px; background: rgba(201,169,110,0.14); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .name-first, .name-last { letter-spacing: 0.04em; }
      .bbar { gap: 1.1rem; }
    }
  </style>
</head>
<body>

  <div id="cursor"><div class="c-ring"></div><div class="c-dot"></div></div>
  <canvas id="bg-canvas"></canvas>
  <div class="vignette"></div>

  <!-- Corners -->
  <div class="corner tl"><svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 38 L0 0 L38 0" stroke="#c9a96e" stroke-width="1"/><circle cx="0" cy="0" r="2.5" fill="#c9a96e" opacity="0.6"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 38 L0 0 L38 0" stroke="#c9a96e" stroke-width="1"/><circle cx="0" cy="0" r="2.5" fill="#c9a96e" opacity="0.6"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 38 L0 0 L38 0" stroke="#c9a96e" stroke-width="1"/><circle cx="0" cy="0" r="2.5" fill="#c9a96e" opacity="0.6"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 38 L0 0 L38 0" stroke="#c9a96e" stroke-width="1"/><circle cx="0" cy="0" r="2.5" fill="#c9a96e" opacity="0.6"/></svg></div>

  <main>
    <div class="badge"><div class="bdot"></div>Available for collaborations</div>

    <div class="name-wrap">
      <span class="name-first">Aayush</span>
      <span class="name-last" data-text="TYAGI">TYAGI</span>
    </div>

    <div class="divider">
      <div class="dl"></div>
      <div class="dg">✦ &nbsp; Portfolio &nbsp; ✦</div>
      <div class="dl r"></div>
    </div>

    <div class="roles">
      <div class="pill">✍️ &nbsp; Writer</div>
      <div class="pill">🎨 &nbsp; Graphic Designer</div>
    </div>

    <p class="tagline">
      Crafting stories that linger &amp; visuals that speak —<br>
      where language meets design.
    </p>

    <div class="ctas">
      <a href="mailto:aayush@email.com" class="btn btn-p">Get in Touch</a>
      <a href="#work" class="btn btn-g">See My Work</a>
    </div>
  </main>

  <div class="bbar">
    <span class="bi">India</span>
    <div class="bs"></div>
    <span class="bi">Open to Freelance</span>
    <div class="bs"></div>
    <span class="bi">© 2025 Aayush Tyagi</span>
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    let mx=0, my=0, cx=0, cy=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    document.addEventListener('mouseleave', () => cursor.style.opacity='0');
    document.addEventListener('mouseenter', () => cursor.style.opacity='1');
    (function animCursor(){ cx+=(mx-cx)*0.13; cy+=(my-cy)*0.13; cursor.style.left=cx+'px'; cursor.style.top=cy+'px'; requestAnimationFrame(animCursor); })();

    // Canvas stars
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars=[], mouse={x:-999,y:-999}, t=0;

    function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
    resize(); window.addEventListener('resize',()=>{ resize(); init(); });
    document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

    function init(){
      stars=[];
      const n = Math.floor(W*H/5500);
      for(let i=0;i<n;i++) stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.3+0.2,
        a: Math.random()*0.55+0.08,
        sp: Math.random()*0.25+0.04,
        dr: (Math.random()-0.5)*0.12,
        tw: Math.random()*Math.PI*2,
        tws: Math.random()*0.018+0.004
      });
    }
    init();

    function draw(){
      ctx.clearRect(0,0,W,H);
      t+=0.5;

      // Scan line
      const sy=(t*0.35)%(H+60)-30;
      const sg=ctx.createLinearGradient(0,sy-30,0,sy+30);
      sg.addColorStop(0,'transparent'); sg.addColorStop(0.5,'rgba(201,169,110,0.022)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,sy-30,W,60);

      stars.forEach(s=>{
        s.tw+=s.tws;
        const tw=0.5+0.5*Math.sin(s.tw);
        const dx=s.x-mouse.x, dy=s.y-mouse.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        let px=0,py=0;
        if(d<110){ const f=(110-d)/110; px=(dx/d)*f*1.2; py=(dy/d)*f*1.2; }
        s.y-=s.sp; s.x+=s.dr+px*0.25; s.y+=py*0.25;
        if(s.y<-4){ s.y=H+4; s.x=Math.random()*W; }
        if(s.x<-4) s.x=W+4; if(s.x>W+4) s.x=-4;
        const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);
        g.addColorStop(0,`rgba(232,213,176,${s.a*tw})`); g.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
